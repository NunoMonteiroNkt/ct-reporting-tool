deployAs:
  - name: merchant-center-custom-application
    applicationType: merchant-center-custom-application
    configuration:
      standardConfiguration:
        - key: CUSTOM_APPLICATION_ID
          description: the Custom Application ID
          required: true
        - key: CLOUD_IDENTIFIER
          description: The cloud identifier
          default: 'gcp-eu'
        - key: ENTRY_POINT_URI_PATH
          description: The Application entry point URI path
          required: true
        - key: PREVIEW_URL
          description: Override the application URL (useful for preview deployments)
          required: false
inheritAs:
  configuration:
    standardConfiguration: []
    securedConfiguration:
      - key: CTP_PROJECT_KEY
        description: Commercetools project key
      - key: CTP_CLIENT_ID
        description: Commercetools client ID
      - key: CTP_CLIENT_SECRET
        description: Commercetools client secreet
      - key: CTP_SCOPE
        description: Commercetools client scope
      - key: CTP_REGION
        description: Region of Commercetools project
      - key: SEARCH_PLATFORM_CONFIG
        description: Escaped JSON object including credentails to search platform and
          other settings