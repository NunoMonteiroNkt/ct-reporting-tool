name: ct-reporting-tools
description: CT Reporting Tools Custom Application
vendor: Your Company Name
version: "1.0.0"

deployAs:
  - name: merchant-center-custom-application
    applicationType: merchant-center-custom-application
    endpoint: /ct-reporting-tools
    configuration:
      standardConfiguration:
        - key: CUSTOM_APPLICATION_ID
          description: The Custom Application ID is provided when you add a Custom Application in the Merchant Center
          required: true
        - key: CLOUD_IDENTIFIER
          description: The identifier of the cloud Region that the Custom Application uses to connect to Composable Commerce
          default: 'gcp-eu'
        - key: ENTRY_POINT_URI_PATH
          description: The Application entry point URI path identified during registration of Custom Application
          required: true